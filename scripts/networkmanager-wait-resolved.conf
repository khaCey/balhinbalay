# Drop-in for NetworkManager: start after systemd-resolved so the DNS plugin
# is ready at boot. Reduces "WiFi doesn't connect until I restart NetworkManager".
#
# Install (from repo root, run once):
#   sudo mkdir -p /etc/systemd/system/NetworkManager.service.d
#   sudo cp scripts/networkmanager-wait-resolved.conf /etc/systemd/system/NetworkManager.service.d/
#   sudo systemctl daemon-reload
#
# Reboot and test. To remove: sudo rm /etc/systemd/system/NetworkManager.service.d/networkmanager-wait-resolved.conf && sudo systemctl daemon-reload

[Unit]
After=systemd-resolved.service
Wants=systemd-resolved.service
